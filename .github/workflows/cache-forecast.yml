name: Cache NESO Wind Forecast

on:
  schedule:
    # Run 8x daily (every 3 hours) to match NESO's 8x/day update cadence.
    # No historical archive exists, so every missed snapshot is lost forever.
    - cron: '0 0,3,6,9,12,15,18,21 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  cache:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download forecast
        run: python scripts/download_forecast.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No new data to commit"
          else
            git commit -m "Archive NESO wind forecast $(date -u +%Y-%m-%dT%H%M)Z"
            git push
          fi
